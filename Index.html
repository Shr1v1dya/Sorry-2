<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Card 🐧💐</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background: linear-gradient(to bottom, #aee1f9, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        max-width: 350px;
        position: relative;
    }

    .penguin {
        font-size: 80px;
    }

    h2 {
        margin: 10px 0;
        color: #333;
    }

    p {
        font-size: 18px;
        color: #555;
    }

    .buttons {
        margin-top: 20px;
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .yes {
        background-color: #4CAF50;
        color: white;
    }

    .yes:hover {
        background-color: #45a049;
    }

    .no {
        background-color: #ccc;
        color: #666;
        cursor: not-allowed;
    }

    /* Explosion message */
    .explosion {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 24px;
        font-weight: bold;
        color: #ff4081;
        text-align: center;
        transition: transform 0.6s ease;
    }

    .show {
        transform: translate(-50%, -50%) scale(1.5);
    }

    /* Confetti */
    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: red;
        top: -10px;
        animation: fall 3s linear infinite;
    }

    @keyframes fall {
        to {
            transform: translateY(100vh) rotate(360deg);
        }
    }
</style>
</head>
<body>

<div class="card">
    <div class="penguin">🐧💐</div>
    <h2>I'm Really Sorry 😔</h2>
    <p>Please forgive me?</p>

    <div class="buttons">
        <button class="yes" onclick="sayYes()">Yes 💖</button>
        <button class="no" disabled>No 😢</button>
    </div>

    <div id="message" class="explosion">
        💥 You are officially my boyfriend now! 💖
    </div>
</div>

<script>
function sayYes() {
    const msg = document.getElementById("message");
    msg.classList.add("show");

    // Create confetti
    for (let i = 0; i < 30; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = getRandomColor();
        confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 3000);
    }
}

function getRandomColor() {
    const colors = ["#ff4081", "#4CAF50", "#2196F3", "#FFC107", "#9C27B0"];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
